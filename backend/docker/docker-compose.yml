version: '3.8'
services:
  backend:
    build: ../backend
    ports:
      - "8080:8080"
    env_file:
      - ../.env
    depends_on:
      - postgres
      - qdrant
  frontend:
    build: ../frontend
    ports:
      - "3000:3000"
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: trustrag
      POSTGRES_PASSWORD: trustrag
      POSTGRES_DB: trustrag
    volumes:
      - pgdata:/var/lib/postgresql/data
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
volumes:
  pgdata:
